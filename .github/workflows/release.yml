name: release

# On every version tag, build a pure-Python sdist + wheel and (a) attach them
# to the GitHub Release and (b) publish to PyPI via Trusted Publishing (OIDC) —
# no API token stored anywhere.
#
# Unlike the engine repo (mantissa / mantissa-core), this package ships no
# compiled code: it builds on mantissa-cnn (which pulls the mantissa C engine
# via mantissa-core) at runtime. A single py3-none-any wheel therefore serves
# every OS and every Python 3.x, so there is no per-OS / per-Python build
# matrix.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build --outdir dist
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish GitHub Release with wheel + sdist
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true

  # PyPI publish via Trusted Publishing (OIDC). Authenticated by PyPI's
  # trusted-publisher config for this repo, which must match exactly:
  # project `mantissa-mlp`, owner `tekinertekin`, repository `mantissa-mlp`,
  # workflow `release.yml`, environment `pypi`.
  publish-pypi:
    needs: [build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # OIDC token for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Non-fatal if a version was already published (safe tag re-runs).
          skip-existing: true
